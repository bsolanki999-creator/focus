<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#10141d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Lamplight — Focus Tracker</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;600&family=Roboto+Mono:wght@300;400;500&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #10141d; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ---------- helpers ----------
const fmt = (s) => {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, "0")}`;
};

const PRESETS = [1, 2, 3, 5, 10, 15, 20, 30, 45, 60];

// Safe localStorage (works on Netlify; quietly disabled in sandboxed previews)
const store = {
  load() {
    try {
      return JSON.parse(localStorage.getItem("lamplight-history") || "[]");
    } catch {
      return [];
    }
  },
  save(list) {
    try {
      localStorage.setItem("lamplight-history", JSON.stringify(list));
    } catch {}
  },
};

// Short silent WAV, looped, to activate the Media Session (lock-screen buttons)
const SILENT_WAV =
  "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=";

function FocusTracker() {
  const [phase, setPhase] = useState("setup"); // setup | running | done
  const [minutes, setMinutes] = useState(1);
  const [customMin, setCustomMin] = useState("");
  const [focused, setFocused] = useState(true);
  const [elapsed, setElapsed] = useState(0);
  const [history, setHistory] = useState([]);
  const [result, setResult] = useState(null);
  const [keepAwake, setKeepAwake] = useState(() => {
    try {
      return localStorage.getItem("lamplight-keep-awake") !== "off";
    } catch {
      return true;
    }
  });
  const [activity, setActivity] = useState(() => {
    try {
      return localStorage.getItem("lamplight-activity") || "";
    } catch {
      return "";
    }
  });
  const [trendMode, setTrendMode] = useState("day");
  const [editingDate, setEditingDate] = useState(null);
  const [editText, setEditText] = useState("");
  const [confirmClear, setConfirmClear] = useState(false);
  const activityRef = useRef("");
  activityRef.current = activity;
  const keepAwakeRef = useRef(true);
  keepAwakeRef.current = keepAwake;

  const setKeepAwakePersist = (v) => {
    setKeepAwake(v);
    try {
      localStorage.setItem("lamplight-keep-awake", v ? "on" : "off");
    } catch {}
  };

  const segmentsRef = useRef([]);
  const sessionStartRef = useRef(null);
  const lastSwitchRef = useRef(null);
  const focusedRef = useRef(true);
  const phaseRef = useRef("setup");
  const wakeLockRef = useRef(null);
  const audioRef = useRef(null);

  phaseRef.current = phase;
  focusedRef.current = focused;
  const totalSec = minutes * 60;

  useEffect(() => {
    setHistory(store.load());
  }, []);

  const saveRename = (date) => {
    setHistory((prev) => {
      const next = prev.map((x) =>
        x.date === date
          ? { ...x, activity: editText.trim() || "Untitled" }
          : x
      );
      store.save(next);
      return next;
    });
    setEditingDate(null);
  };

  // ---------- wake lock ----------
  const requestWakeLock = async () => {
    try {
      if (keepAwakeRef.current && "wakeLock" in navigator)
        wakeLockRef.current = await navigator.wakeLock.request("screen");
    } catch {}
  };
  const releaseWakeLock = () => {
    try {
      wakeLockRef.current?.release();
      wakeLockRef.current = null;
    } catch {}
  };

  // ---------- media session (earbud / BT remote play-pause, works with screen locked) ----------
  const startMediaSession = (toggleFn) => {
    try {
      if (!audioRef.current) {
        const a = new Audio(SILENT_WAV);
        a.loop = true;
        a.volume = 0.01;
        audioRef.current = a;
      }
      audioRef.current.play().catch(() => {});
      if ("mediaSession" in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: "Focus session",
          artist: "Lamplight",
        });
        ["play", "pause", "previoustrack", "nexttrack"].forEach((action) => {
          try {
            navigator.mediaSession.setActionHandler(action, () => {
              toggleFn();
              // keep audio playing so the session stays active
              audioRef.current?.play().catch(() => {});
              try {
                navigator.mediaSession.playbackState = "playing";
              } catch {}
            });
          } catch {}
        });
      }
    } catch {}
  };
  const stopMediaSession = () => {
    try {
      audioRef.current?.pause();
      if ("mediaSession" in navigator) {
        ["play", "pause", "previoustrack", "nexttrack"].forEach((a) => {
          try {
            navigator.mediaSession.setActionHandler(a, null);
          } catch {}
        });
      }
    } catch {}
  };

  // ---------- session control ----------
  const closeCurrentSegment = () => {
    const t = Date.now();
    segmentsRef.current.push({
      type: focusedRef.current ? "focus" : "wander",
      start: (lastSwitchRef.current - sessionStartRef.current) / 1000,
      end: (t - sessionStartRef.current) / 1000,
    });
    lastSwitchRef.current = t;
  };

  const toggle = useCallback(() => {
    if (phaseRef.current !== "running") return;
    closeCurrentSegment();
    setFocused((f) => !f);
    if (navigator.vibrate) navigator.vibrate(30);
  }, []);

  const startSession = () => {
    const t = Date.now();
    sessionStartRef.current = t;
    lastSwitchRef.current = t;
    segmentsRef.current = [];
    setElapsed(0);
    setFocused(true);
    focusedRef.current = true;
    setPhase("running");
    requestWakeLock();
    startMediaSession(toggle);
  };

  const finishSession = useCallback(() => {
    closeCurrentSegment();
    const segs = segmentsRef.current.map((s) => ({
      ...s,
      end: Math.min(s.end, totalSec),
    }));
    const focusTime = segs
      .filter((s) => s.type === "focus")
      .reduce((a, s) => a + (s.end - s.start), 0);
    const total = Math.min(
      (Date.now() - sessionStartRef.current) / 1000,
      totalSec
    );
    const wanders = segs.filter((s) => s.type === "wander").length;
    const focusSegs = segs.filter((s) => s.type === "focus");
    const wanderSegs = segs.filter((s) => s.type === "wander");
    const wanderTime = wanderSegs.reduce((a, s) => a + (s.end - s.start), 0);
    const longest = focusSegs.reduce((a, s) => Math.max(a, s.end - s.start), 0);
    const avgStreak =
      focusSegs.length > 0 ? focusTime / focusSegs.length : 0;
    const longestWander = wanderSegs.reduce(
      (a, s) => Math.max(a, s.end - s.start),
      0
    );
    const avgWander = wanderSegs.length > 0 ? wanderTime / wanderSegs.length : 0;
    const firstWander = wanderSegs.length > 0 ? wanderSegs[0].start : null;
    const res = {
      segs,
      focusTime,
      wanderTime,
      total,
      wanders,
      longest,
      avgStreak,
      longestWander,
      avgWander,
      firstWander,
      efficiency: total > 0 ? (focusTime / total) * 100 : 0,
    };
    setResult(res);
    setPhase("done");
    releaseWakeLock();
    stopMediaSession();
    if (navigator.vibrate) navigator.vibrate([100, 60, 100]);

    // save to history (persists on your hosted site)
    const entry = {
      date: Date.now(),
      minutes: Math.round(total / 60),
      efficiency: Math.round(res.efficiency),
      focusTime: Math.round(focusTime),
      wanders,
      activity: activityRef.current.trim() || "Untitled",
    };
    try {
      localStorage.setItem("lamplight-activity", activityRef.current.trim());
    } catch {}
    setHistory((h) => {
      const next = [entry, ...h].slice(0, 50);
      store.save(next);
      return next;
    });
  }, [totalSec]);

  // ---------- timer tick (timestamp-based, stays accurate if throttled) ----------
  useEffect(() => {
    if (phase !== "running") return;
    const id = setInterval(() => {
      const e = (Date.now() - sessionStartRef.current) / 1000;
      setElapsed(e);
      if (e >= totalSec) finishSession();
    }, 200);
    return () => clearInterval(id);
  }, [phase, totalSec, finishSession]);

  // ---------- keyboard / bluetooth keyboard-style button ----------
  useEffect(() => {
    const onKey = (e) => {
      if (phaseRef.current !== "running") return;
      if (e.key === "Tab") return;
      e.preventDefault();
      toggle();
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [toggle]);

  // catch up instantly when screen/tab comes back
  useEffect(() => {
    const onVis = () => {
      if (document.visibilityState === "visible" && phaseRef.current === "running") {
        requestWakeLock();
        const e = (Date.now() - sessionStartRef.current) / 1000;
        setElapsed(e);
        if (e >= totalSec) finishSession();
      }
    };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, [totalSec, finishSession]);

  const liveSegs =
    phase === "running"
      ? [
          ...segmentsRef.current,
          {
            type: focused ? "focus" : "wander",
            start: (lastSwitchRef.current - sessionStartRef.current) / 1000,
            end: elapsed,
          },
        ]
      : result?.segs || [];

  const remaining = Math.max(0, totalSec - elapsed);

  // ---------- styles ----------
  const S = {
    root: {
      minHeight: "100vh",
      background: "#10141d",
      color: "#e9e4d8",
      fontFamily: "'Space Grotesk', system-ui, sans-serif",
      display: "flex",
      flexDirection: "column",
      alignItems: "center",
      justifyContent: "center",
      padding: "24px",
      userSelect: "none",
      WebkitTapHighlightColor: "transparent",
      transition: "background 0.6s ease",
    },
    label: {
      fontSize: 12,
      letterSpacing: "0.25em",
      textTransform: "uppercase",
      color: "#7d8494",
      marginBottom: 8,
    },
    timer: {
      fontFamily: "'Roboto Mono', ui-monospace, monospace",
      fontVariantNumeric: "tabular-nums",
      fontWeight: 300,
      lineHeight: 1,
    },
    btn: {
      background: "#f2b23e",
      color: "#10141d",
      border: "none",
      borderRadius: 999,
      padding: "16px 48px",
      fontSize: 17,
      fontWeight: 600,
      fontFamily: "inherit",
      cursor: "pointer",
      letterSpacing: "0.02em",
    },
    ghostBtn: {
      background: "transparent",
      color: "#7d8494",
      border: "1px solid #2a3140",
      borderRadius: 999,
      padding: "12px 32px",
      fontSize: 15,
      fontFamily: "inherit",
      cursor: "pointer",
    },
  };

  const Ribbon = ({ segs, total, height = 10 }) => (
    <div
      style={{
        width: "100%",
        height,
        borderRadius: height,
        background: "#1c222e",
        overflow: "hidden",
        position: "relative",
      }}
    >
      {segs.map((s, i) => (
        <div
          key={i}
          style={{
            position: "absolute",
            left: `${(s.start / total) * 100}%`,
            width: `${Math.max(0.3, ((s.end - s.start) / total) * 100)}%`,
            top: 0,
            bottom: 0,
            background: s.type === "focus" ? "#f2b23e" : "#39414f",
          }}
        />
      ))}
    </div>
  );

  // ================= SETUP =================
  if (phase === "setup") {
    return (
      <div style={S.root}>
        <FontLoader />
        <div style={{ maxWidth: 440, width: "100%", textAlign: "center" }}>
          <div style={S.label}>Focus session</div>
          <h1
            style={{
              fontSize: 44,
              fontWeight: 500,
              margin: "0 0 6px",
              letterSpacing: "-0.02em",
            }}
          >
            Lamplight
          </h1>
          <p style={{ color: "#7d8494", fontSize: 15, margin: "0 0 36px" }}>
            Tap the screen, press any key, or click your earbud / media button
            whenever your mind wanders — and again when you're back.
          </p>

          <div style={S.label}>Activity</div>
          <input
            type="text"
            placeholder="e.g. Studying, Meditation, Reading"
            value={activity}
            maxLength={30}
            onChange={(e) => setActivity(e.target.value)}
            style={{
              background: "#1a2029",
              border: "1px solid #2a3140",
              borderRadius: 12,
              color: "#e9e4d8",
              padding: "12px 16px",
              fontSize: 15,
              fontFamily: "inherit",
              width: "100%",
              maxWidth: 300,
              textAlign: "center",
              marginBottom: 28,
              outline: "none",
            }}
          />

          <div style={S.label}>Duration</div>
          <div
            style={{
              display: "grid",
              gridTemplateColumns: "repeat(5, 1fr)",
              gap: 8,
              marginBottom: 16,
            }}
          >
            {PRESETS.map((p) => (
              <button
                key={p}
                onClick={() => {
                  setMinutes(p);
                  setCustomMin("");
                }}
                style={{
                  ...S.ghostBtn,
                  padding: "10px 0",
                  fontSize: 14,
                  color: minutes === p && !customMin ? "#10141d" : "#e9e4d8",
                  background:
                    minutes === p && !customMin ? "#f2b23e" : "transparent",
                  borderColor:
                    minutes === p && !customMin ? "#f2b23e" : "#2a3140",
                  fontWeight: 600,
                }}
              >
                {p}m
              </button>
            ))}
          </div>
          <input
            type="number"
            inputMode="numeric"
            placeholder="Custom minutes"
            value={customMin}
            min="1"
            max="480"
            onChange={(e) => {
              setCustomMin(e.target.value);
              const v = parseInt(e.target.value, 10);
              if (v > 0) setMinutes(v);
            }}
            style={{
              background: "#1a2029",
              border: "1px solid #2a3140",
              borderRadius: 12,
              color: "#e9e4d8",
              padding: "12px 16px",
              fontSize: 15,
              fontFamily: "inherit",
              width: 160,
              textAlign: "center",
              marginBottom: 32,
              outline: "none",
            }}
          />
          <div
            onClick={() => setKeepAwakePersist(!keepAwake)}
            style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              gap: 10,
              cursor: "pointer",
              marginBottom: 28,
              color: "#7d8494",
              fontSize: 14,
            }}
          >
            <div
              style={{
                width: 40,
                height: 22,
                borderRadius: 999,
                background: keepAwake ? "#f2b23e" : "#2a3140",
                position: "relative",
                transition: "background 0.25s ease",
                flexShrink: 0,
              }}
            >
              <div
                style={{
                  position: "absolute",
                  top: 3,
                  left: keepAwake ? 21 : 3,
                  width: 16,
                  height: 16,
                  borderRadius: "50%",
                  background: keepAwake ? "#10141d" : "#5c6474",
                  transition: "left 0.25s ease, background 0.25s ease",
                }}
              />
            </div>
            <span style={{ color: keepAwake ? "#e9e4d8" : "#7d8494" }}>
              Keep screen on during session
            </span>
          </div>
          <div style={{ marginBottom: 40 }}>
            <button style={S.btn} onClick={startSession}>
              Start {minutes} min
            </button>
          </div>

          {history.length > 0 && (
            <div style={{ textAlign: "left" }}>
              <div style={{ ...S.label, textAlign: "center" }}>
                Recent sessions
              </div>
              <div
                style={{
                  display: "flex",
                  justifyContent: "center",
                  gap: 18,
                  color: "#7d8494",
                  fontSize: 13,
                  marginBottom: 14,
                }}
              >
                <span>
                  Avg{" "}
                  <span style={{ color: "#f2b23e", fontFamily: "'Roboto Mono', monospace" }}>
                    {Math.round(
                      history.reduce((a, h) => a + h.efficiency, 0) /
                        history.length
                    )}
                    %
                  </span>
                </span>
                <span>
                  Total focus{" "}
                  <span style={{ color: "#f2b23e", fontFamily: "'Roboto Mono', monospace" }}>
                    {fmt(history.reduce((a, h) => a + (h.focusTime || 0), 0))}
                  </span>
                </span>
                <span>
                  Sessions{" "}
                  <span style={{ color: "#f2b23e", fontFamily: "'Roboto Mono', monospace" }}>
                    {history.length}
                  </span>
                </span>
              </div>
              <TrendChart
                history={history}
                mode={trendMode}
                setMode={setTrendMode}
              />
              <ActivityBreakdown history={history} />
              {history.slice(0, 5).map((h, i) => (
                <div
                  key={h.date}
                  style={{
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                    background: "#1a2029",
                    border: "1px solid #2a3140",
                    borderRadius: 12,
                    padding: "10px 12px 10px 16px",
                    marginBottom: 8,
                    fontSize: 14,
                    gap: 8,
                  }}
                >
                  <span style={{ flex: 1, minWidth: 0 }}>
                    {editingDate === h.date ? (
                      <input
                        type="text"
                        autoFocus
                        value={editText}
                        maxLength={30}
                        onChange={(e) => setEditText(e.target.value)}
                        onKeyDown={(e) => {
                          if (e.key === "Enter") saveRename(h.date);
                          if (e.key === "Escape") setEditingDate(null);
                        }}
                        style={{
                          background: "#10141d",
                          border: "1px solid #f2b23e",
                          borderRadius: 8,
                          color: "#e9e4d8",
                          padding: "6px 10px",
                          fontSize: 14,
                          fontFamily: "inherit",
                          width: "100%",
                          outline: "none",
                          boxSizing: "border-box",
                        }}
                      />
                    ) : (
                      <span
                        style={{
                          display: "block",
                          color: "#e9e4d8",
                          whiteSpace: "nowrap",
                          overflow: "hidden",
                          textOverflow: "ellipsis",
                        }}
                      >
                        {h.activity || "Untitled"}
                      </span>
                    )}
                    {editingDate !== h.date && (
                      <span style={{ color: "#5c6474", fontSize: 12 }}>
                        {new Date(h.date).toLocaleDateString(undefined, {
                          month: "short",
                          day: "numeric",
                        })}{" "}
                        ·{" "}
                        {new Date(h.date).toLocaleTimeString(undefined, {
                          hour: "numeric",
                          minute: "2-digit",
                        })}
                      </span>
                    )}
                  </span>
                  {editingDate !== h.date && (
                    <>
                      <span style={{ color: "#7d8494" }}>{h.minutes}m</span>
                      <span style={{ color: "#7d8494" }}>{h.wanders}×</span>
                      <span
                        style={{
                          fontFamily: "'Roboto Mono', monospace",
                          color: "#f2b23e",
                          fontWeight: 500,
                          minWidth: 42,
                          textAlign: "right",
                        }}
                      >
                        {h.efficiency}%
                      </span>
                    </>
                  )}
                  {editingDate === h.date ? (
                    <button
                      onClick={() => saveRename(h.date)}
                      aria-label="Save name"
                      style={{
                        background: "#f2b23e",
                        border: "none",
                        borderRadius: 8,
                        color: "#10141d",
                        fontSize: 14,
                        fontWeight: 700,
                        cursor: "pointer",
                        padding: "6px 12px",
                        lineHeight: 1,
                      }}
                    >
                      ✓
                    </button>
                  ) : (
                    <button
                      onClick={() => {
                        setEditingDate(h.date);
                        setEditText(h.activity || "");
                      }}
                      aria-label="Rename session"
                      style={{
                        background: "transparent",
                        border: "none",
                        color: "#5c6474",
                        fontSize: 15,
                        cursor: "pointer",
                        padding: "0 2px",
                        lineHeight: 1,
                      }}
                    >
                      ✎
                    </button>
                  )}
                  <button
                    onClick={() => {
                      setHistory((prev) => {
                        const next = prev.filter((x) => x.date !== h.date);
                        store.save(next);
                        return next;
                      });
                    }}
                    aria-label="Delete session"
                    style={{
                      background: "transparent",
                      border: "none",
                      color: "#5c6474",
                      fontSize: 18,
                      cursor: "pointer",
                      padding: "0 4px",
                      lineHeight: 1,
                    }}
                  >
                    ×
                  </button>
                </div>
              ))}
              <div style={{ textAlign: "center", marginTop: 12 }}>
                <button
                  onClick={() => {
                    if (!confirmClear) {
                      setConfirmClear(true);
                      setTimeout(() => setConfirmClear(false), 3000);
                    } else {
                      setHistory([]);
                      store.save([]);
                      setConfirmClear(false);
                    }
                  }}
                  style={{
                    ...S.ghostBtn,
                    padding: "8px 20px",
                    fontSize: 13,
                    color: confirmClear ? "#e06c5a" : "#5c6474",
                    borderColor: confirmClear ? "#e06c5a" : "#2a3140",
                  }}
                >
                  {confirmClear ? "Tap again to delete all" : "Clear history"}
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ================= RUNNING =================
  if (phase === "running") {
    return (
      <div
        style={{
          ...S.root,
          background: focused ? "#10141d" : "#191a1d",
          cursor: "pointer",
          justifyContent: "space-between",
          paddingTop: 48,
          paddingBottom: 48,
        }}
        onClick={toggle}
      >
        <FontLoader />
        <div style={{ textAlign: "center" }}>
          <div style={S.label}>
            {(activity.trim() || "Session") +
              " — " +
              (focused ? "Focused" : "Wandering")}
          </div>
          <div
            style={{
              width: 14,
              height: 14,
              borderRadius: "50%",
              margin: "6px auto 0",
              background: focused ? "#f2b23e" : "#39414f",
              boxShadow: focused
                ? "0 0 24px 6px rgba(242,178,62,0.35)"
                : "none",
              transition: "all 0.4s ease",
            }}
          />
        </div>

        <div style={{ textAlign: "center" }}>
          <div
            style={{
              ...S.timer,
              fontSize: "min(26vw, 130px)",
              color: focused ? "#e9e4d8" : "#5c6474",
              transition: "color 0.4s ease",
            }}
          >
            {fmt(remaining)}
          </div>
          <div style={{ color: "#7d8494", fontSize: 14, marginTop: 12 }}>
            {focused
              ? "Tap, any key, or media button when you drift"
              : "Tap, any key, or media button when you're back"}
          </div>
        </div>

        <div style={{ width: "100%", maxWidth: 520 }}>
          <Ribbon segs={liveSegs} total={totalSec} />
          <div style={{ textAlign: "center", marginTop: 20 }}>
            <button
              style={S.ghostBtn}
              onClick={(e) => {
                e.stopPropagation();
                finishSession();
              }}
            >
              End early
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ================= DONE =================
  const eff = result?.efficiency ?? 0;
  const grade =
    eff >= 90
      ? "Locked in."
      : eff >= 75
      ? "Strong session."
      : eff >= 50
      ? "A wandering mind is a normal mind."
      : "Rough one — the next session starts fresh.";

  return (
    <div style={S.root}>
      <FontLoader />
      <div style={{ maxWidth: 480, width: "100%", textAlign: "center" }}>
        <div style={S.label}>Session complete</div>
        <div
          style={{
            ...S.timer,
            fontSize: "min(24vw, 110px)",
            color: "#f2b23e",
            margin: "8px 0 4px",
          }}
        >
          {Math.round(eff)}%
        </div>
        <div style={{ color: "#e9e4d8", fontSize: 17, marginBottom: 32 }}>
          {grade}
        </div>

        <div style={{ marginBottom: 28 }}>
          <Ribbon segs={result.segs} total={result.total} height={14} />
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              fontSize: 12,
              color: "#7d8494",
              marginTop: 6,
            }}
          >
            <span>0:00</span>
            <span>{fmt(result.total)}</span>
          </div>
        </div>

        <div
          style={{
            display: "grid",
            gridTemplateColumns: "1fr 1fr 1fr",
            gap: 12,
            marginBottom: 16,
          }}
        >
          {[
            ["Focused", fmt(result.focusTime)],
            ["Wandered", fmt(result.wanderTime)],
            ["Drifts", `${result.wanders}×`],
            ["Best streak", fmt(result.longest)],
            ["Avg streak", fmt(result.avgStreak)],
            ["Avg drift", result.wanders > 0 ? fmt(result.avgWander) : "—"],
          ].map(([label, val]) => (
            <div
              key={label}
              style={{
                background: "#1a2029",
                border: "1px solid #2a3140",
                borderRadius: 16,
                padding: "16px 8px",
              }}
            >
              <div
                style={{
                  fontFamily: "'Roboto Mono', monospace",
                  fontSize: 20,
                  marginBottom: 4,
                }}
              >
                {val}
              </div>
              <div style={{ ...S.label, marginBottom: 0, fontSize: 10 }}>
                {label}
              </div>
            </div>
          ))}
        </div>
        <div
          style={{
            color: "#7d8494",
            fontSize: 13,
            marginBottom: 36,
            lineHeight: 1.6,
          }}
        >
          {result.wanders === 0
            ? "Zero drifts — an unbroken session."
            : `First drift at ${fmt(result.firstWander)} · longest drift ${fmt(
                result.longestWander
              )} · you drifted about once every ${fmt(
                result.total / result.wanders
              )}.`}
        </div>

        <button style={S.btn} onClick={() => setPhase("setup")}>
          New session
        </button>
      </div>
    </div>
  );
}

// Daily / weekly focus trend
function TrendChart({ history, mode, setMode }) {
  const now = new Date();
  const dayStart = (d) =>
    new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();

  let buckets = [];
  if (mode === "day") {
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      const start = dayStart(d);
      const end = start + 86400000;
      const items = history.filter((h) => h.date >= start && h.date < end);
      buckets.push({
        label: d.toLocaleDateString(undefined, { weekday: "narrow" }),
        sub: d.getDate(),
        focusMin: items.reduce((a, h) => a + (h.focusTime || 0), 0) / 60,
        eff:
          items.length > 0
            ? Math.round(
                items.reduce((a, h) => a + h.efficiency, 0) / items.length
              )
            : null,
      });
    }
  } else {
    // last 6 weeks, starting Monday
    const monday = new Date(now);
    const dow = (monday.getDay() + 6) % 7; // 0 = Monday
    monday.setDate(monday.getDate() - dow);
    for (let i = 5; i >= 0; i--) {
      const ws = new Date(monday);
      ws.setDate(ws.getDate() - i * 7);
      const start = dayStart(ws);
      const end = start + 7 * 86400000;
      const items = history.filter((h) => h.date >= start && h.date < end);
      buckets.push({
        label:
          ws.toLocaleDateString(undefined, { month: "short", day: "numeric" }),
        sub: "",
        focusMin: items.reduce((a, h) => a + (h.focusTime || 0), 0) / 60,
        eff:
          items.length > 0
            ? Math.round(
                items.reduce((a, h) => a + h.efficiency, 0) / items.length
              )
            : null,
      });
    }
  }

  const max = Math.max(1, ...buckets.map((b) => b.focusMin));
  const label = {
    fontSize: 12,
    letterSpacing: "0.25em",
    textTransform: "uppercase",
    color: "#7d8494",
  };

  return (
    <div
      style={{
        background: "#1a2029",
        border: "1px solid #2a3140",
        borderRadius: 16,
        padding: "16px 16px 12px",
        marginBottom: 14,
      }}
    >
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
          marginBottom: 14,
        }}
      >
        <span style={label}>Focus trend</span>
        <div style={{ display: "flex", gap: 4 }}>
          {[
            ["day", "7 days"],
            ["week", "6 weeks"],
          ].map(([m, t]) => (
            <button
              key={m}
              onClick={() => setMode(m)}
              style={{
                background: mode === m ? "#2a3140" : "transparent",
                color: mode === m ? "#e9e4d8" : "#5c6474",
                border: "none",
                borderRadius: 8,
                padding: "5px 12px",
                fontSize: 12,
                fontFamily: "inherit",
                cursor: "pointer",
              }}
            >
              {t}
            </button>
          ))}
        </div>
      </div>
      <div
        style={{
          display: "flex",
          alignItems: "flex-end",
          gap: mode === "day" ? 8 : 10,
          height: 90,
        }}
      >
        {buckets.map((b, i) => (
          <div
            key={i}
            style={{
              flex: 1,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              justifyContent: "flex-end",
              height: "100%",
              gap: 4,
            }}
          >
            {b.focusMin > 0 && (
              <span
                style={{
                  fontSize: 10,
                  color: "#7d8494",
                  fontFamily: "'Roboto Mono', monospace",
                }}
              >
                {Math.round(b.focusMin)}m
              </span>
            )}
            <div
              style={{
                width: "100%",
                maxWidth: 34,
                height: `${(b.focusMin / max) * 100}%`,
                minHeight: b.focusMin > 0 ? 4 : 2,
                borderRadius: 6,
                background:
                  b.focusMin > 0
                    ? b.eff >= 75
                      ? "#f2b23e"
                      : "#a8843f"
                    : "#232a37",
                transition: "height 0.3s ease",
              }}
              title={
                b.eff !== null ? `${b.eff}% avg efficiency` : "No sessions"
              }
            />
          </div>
        ))}
      </div>
      <div
        style={{
          display: "flex",
          gap: mode === "day" ? 8 : 10,
          marginTop: 6,
        }}
      >
        {buckets.map((b, i) => (
          <div
            key={i}
            style={{
              flex: 1,
              textAlign: "center",
              fontSize: 11,
              color: "#5c6474",
            }}
          >
            {b.label}
            {b.sub !== "" && (
              <span style={{ display: "block", fontSize: 9 }}>{b.sub}</span>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// Per-activity comparison
function ActivityBreakdown({ history }) {
  const groups = {};
  history.forEach((h) => {
    const key = (h.activity || "Untitled").trim() || "Untitled";
    if (!groups[key])
      groups[key] = { name: key, sessions: 0, focusSec: 0, effSum: 0, wanders: 0 };
    groups[key].sessions += 1;
    groups[key].focusSec += h.focusTime || 0;
    groups[key].effSum += h.efficiency;
    groups[key].wanders += h.wanders || 0;
  });
  const list = Object.values(groups)
    .map((g) => ({ ...g, avgEff: Math.round(g.effSum / g.sessions) }))
    .sort((a, b) => b.focusSec - a.focusSec)
    .slice(0, 6);

  if (list.length < 2) return null; // needs at least two activities to compare

  const fmtMin = (s) =>
    s >= 3600
      ? `${Math.floor(s / 3600)}h ${Math.round((s % 3600) / 60)}m`
      : `${Math.round(s / 60)}m`;

  return (
    <div
      style={{
        background: "#1a2029",
        border: "1px solid #2a3140",
        borderRadius: 16,
        padding: "16px 16px 8px",
        marginBottom: 14,
      }}
    >
      <div
        style={{
          fontSize: 12,
          letterSpacing: "0.25em",
          textTransform: "uppercase",
          color: "#7d8494",
          marginBottom: 14,
        }}
      >
        By activity
      </div>
      {list.map((g) => (
        <div key={g.name} style={{ marginBottom: 14 }}>
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "baseline",
              fontSize: 14,
              marginBottom: 5,
              gap: 8,
            }}
          >
            <span
              style={{
                color: "#e9e4d8",
                whiteSpace: "nowrap",
                overflow: "hidden",
                textOverflow: "ellipsis",
              }}
            >
              {g.name}
            </span>
            <span
              style={{
                color: "#5c6474",
                fontSize: 12,
                whiteSpace: "nowrap",
              }}
            >
              {g.sessions}× · {fmtMin(g.focusSec)} ·{" "}
              <span
                style={{
                  color: "#f2b23e",
                  fontFamily: "'Roboto Mono', monospace",
                  fontSize: 13,
                }}
              >
                {g.avgEff}%
              </span>
            </span>
          </div>
          <div
            style={{
              height: 6,
              borderRadius: 6,
              background: "#232a37",
              overflow: "hidden",
            }}
          >
            <div
              style={{
                width: `${g.avgEff}%`,
                height: "100%",
                borderRadius: 6,
                background: g.avgEff >= 75 ? "#f2b23e" : "#a8843f",
                transition: "width 0.3s ease",
              }}
            />
          </div>
        </div>
      ))}
    </div>
  );
}

function FontLoader() {
  useEffect(() => {
    if (document.getElementById("ft-fonts")) return;
    const link = document.createElement("link");
    link.id = "ft-fonts";
    link.rel = "stylesheet";
    link.href =
      "https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;600&family=Roboto+Mono:wght@300;400;500&display=swap";
    document.head.appendChild(link);
  }, []);
  return null;
}
